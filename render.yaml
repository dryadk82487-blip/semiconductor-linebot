services:
  - type: web
    name: semiconductor-linebot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: ADMIN_USER_ID
        sync: false
      - key: CLAUDE_API_KEY
        sync: false
